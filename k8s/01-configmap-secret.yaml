apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "ecommerce"
  DB_USER: "postgres"
  PORT: "8080"

---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secrets
  namespace: ecommerce
type: Opaque
data:
  # echo -n "postgres123" | base64
  DB_PASSWORD: cG9zdGdyZXMxMjM=
  # echo -n "super-secret-jwt-key" | base64
  JWT_SECRET: c3VwZXItc2VjcmV0LWp3dC1rZXk=
